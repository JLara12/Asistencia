<!DOCTYPE html>
<html lang="es" data-theme="light" data-materia="sociales">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia · Pestalozzi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ═══════════════════════════════════════════
   VARIABLES Y TEMAS RECUPERADOS
═══════════════════════════════════════════ */
:root, [data-theme="light"] {
  --bg: #F5F6FA; --white: #FFFFFF; --border: #E8EAF0; --border2: #D8DBE8;
  --text: #1A1D2E; --text2: #6B7094; --text3: #B0B4CC;
  --shadow: 0 4px 16px rgba(60,70,110,.10);
  --radius: 12px; --transition: .18s ease;
  --mat: #2A60C0; --mat-light: #EDF4FF;
}

[data-theme="dark"] {
  --bg: #12141C; --white: #1E212E; --border: #2A2E40; --border2: #3A3F55;
  --text: #E8EAF0; --text2: #9CA3B8; --text3: #6B7094;
}

[data-theme="pastel"] {
  --bg: #E8F0FE; --white: #FFFFFF; --border: #D2E3FC; --border2: #AECBFA;
  --text: #174EA6; --text2: #1967D2; --text3: #669DF6;
}

/* Colores dinámicos por materia */
[data-materia="sociales"]    {--mat:#7B7FD4;--mat-light:#EEEFFE}
[data-materia="ciudadania"]  {--mat:#3DAA82;--mat-light:#E6F8F3}
[data-materia="matematicas"] {--mat:#E07060;--mat-light:#FEEEEC}
[data-materia="espanol"]     {--mat:#D060A0;--mat-light:#FCEEF8}
[data-materia="naturales"]   {--mat:#3AAA50;--mat-light:#E6F8EA}
[data-materia="ingles"]      {--mat:#3080D0;--mat-light:#E6F0FC}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

.app { display: grid; grid-template-columns: 160px 1fr; grid-template-rows: 55px 1fr; grid-template-areas: "logo top" "side main"; height: 100vh; }

/* ── LOGO Y TOPBAR ── */
.logo { grid-area: logo; background: var(--white); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; color: var(--mat); font-family: 'Nunito'; }
.topbar { grid-area: top; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
.topbar-title { font-weight: 800; font-size: 15px; flex: 1; font-family: 'Nunito'; }

/* ── SIDEBAR COMPACTO (160px) ── */
.sidebar { grid-area: side; background: var(--white); border-right: 1px solid var(--border); padding: 12px 6px; overflow-y: auto; }
.sidebar-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text3); padding: 0 10px 8px; letter-spacing: 1px; }
.side-item { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; color: var(--text2); transition: var(--transition); }
.side-item:hover { background: var(--bg); }
.side-item.active { background: var(--mat-light); color: var(--mat); font-weight: 700; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ── MAIN ── */
.main { grid-area: main; display: flex; flex-direction: column; overflow: hidden; }
.tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); padding: 0 25px; }
.tab { padding: 14px 18px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text3); border-bottom: 2px solid transparent; transition: var(--transition); }
.tab.active { color: var(--mat); border-bottom-color: var(--mat); }
.content { flex: 1; overflow-y: auto; padding: 20px; }

/* ── PLANILLA COMPACTA ── */
.planilla-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.scroll-area { overflow-x: auto; }
table { border-collapse: collapse; width: 100%; font-size: 11.5px; }
th { background: var(--bg); padding: 6px; position: sticky; top: 0; z-index: 10; font-weight: 700; border-bottom: 2px solid var(--border); }
.col-name { position: sticky; left: 0; background: inherit; z-index: 9; min-width: 180px; text-align: left; padding: 4px 12px; border-right: 1px solid var(--border); }
.th-day { min-width: 36px; text-align: center; cursor: pointer; }
.th-day span { display: block; font-size: 8px; opacity: 0.6; text-transform: uppercase; }

/* ── MARCADORES VOLUMÉTRICOS PASTEL ── */
.dot-btn { 
  width: 26px; height: 26px; border-radius: 50%; margin: auto; cursor: pointer; 
  display: flex; align-items: center; justify-content: center; font-size: 11px;
  transition: transform 0.1s; position: relative; border: 1px solid rgba(0,0,0,0.03);
}
.dot-btn:active { transform: scale(0.9); }
.dot-btn::after { content: ''; position: absolute; inset: 2px; border-radius: 50%; background: rgba(255,255,255,0.4); clip-path: circle(35% at 30% 30%); }

.dot-empty { border: 1.5px dashed var(--border2); opacity: 0.5; }

/* ── CONFIGURACIÓN ── */
.config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.card { background: var(--white); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
.card h3 { font-size: 14px; margin-bottom: 15px; font-family: 'Nunito'; font-weight: 800; color: var(--mat); }
.input, .sel { width: 100%; padding: 9px; border: 1px solid var(--border2); border-radius: 8px; font-family: inherit; font-size: 13px; margin-bottom: 10px; background: var(--bg); color: var(--text); }
.btn { padding: 9px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; transition: var(--transition); }
.btn-primary { background: var(--mat); color: white; }
.btn-ghost { background: var(--bg); color: var(--text2); border: 1px solid var(--border2); }

.mini-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-d { padding: 5px; font-size: 10px; cursor: pointer; border-radius: 6px; background: var(--bg); }
.cal-d.festivo { background: #FFC9C9; color: #C92A2A; font-weight: 700; }

.res-cell { font-weight: 800; display: flex; flex-direction: column; line-height: 1.1; text-align: center; }

</style>
</head>
<body>

<div class="app">
  <div class="logo">🎒 PESTALOZZI</div>
  
  <div class="topbar">
    <div class="topbar-title" id="currentInfo">Registro de Asistencia</div>
    <select class="sel" id="mainMat" style="width:140px; margin:0" onchange="updateMateria()"></select>
    <select class="sel" id="mainMonth" style="width:120px; margin:0" onchange="renderPlanilla()"></select>
    <button class="btn btn-primary" onclick="saveToFirebase()">💾 Guardar</button>
  </div>

  <aside class="sidebar">
    <div class="sidebar-label">Grupos</div>
    <div id="sideGroups"></div>
  </aside>

  <main class="main">
    <div class="tabs">
      <div class="tab active" data-tab="planilla" onclick="showTab('planilla')">📋 Planilla</div>
      <div class="tab" data-tab="config" onclick="showTab('config')">⚙️ Configuración</div>
    </div>

    <div id="tab-planilla" class="content">
      <div class="planilla-card">
        <div class="scroll-area">
          <table id="tablePlanilla"></table>
        </div>
      </div>
    </div>

    <div id="tab-config" class="content" style="display:none">
      <div class="config-grid">
        
        <div class="card">
          <h3>🎨 Temas y Estilo</h3>
          <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px">
            <button class="btn btn-ghost" onclick="setTheme('light')">☀️ Claro</button>
            <button class="btn btn-ghost" onclick="setTheme('dark')">🌙 Oscuro</button>
            <button class="btn btn-ghost" onclick="setTheme('pastel')">☁️ Pastel</button>
          </div>
        </div>

        <div class="card">
          <h3>🔘 Personalizar Marcadores</h3>
          <div id="indConfig"></div>
        </div>

        <div class="card">
          <h3>📚 Materias y Grupos</h3>
          <div style="display:flex; gap:5px">
            <input class="input" id="newMat" placeholder="Nueva Materia">
            <button class="btn btn-primary" onclick="addMateria()">+</button>
          </div>
          <div id="matList" style="margin:10px 0"></div>
          <div id="groupToggles" style="display:flex; flex-wrap:wrap; gap:5px"></div>
        </div>

        <div class="card">
          <h3>👨‍🎓 Estudiantes</h3>
          <input class="input" id="stuName" placeholder="Nombre completo">
          <select class="sel" id="stuGroup"></select>
          <button class="btn btn-primary" style="width:100%" onclick="addStudent()">Agregar Manual</button>
          <hr style="margin:15px 0; opacity:0.1">
          <button class="btn btn-ghost" style="width:100%" onclick="document.getElementById('excelFile').click()">📂 Importar Excel / CSV</button>
          <input type="file" id="excelFile" style="display:none" onchange="importExcel(event)">
        </div>

        <div class="card">
          <h3>📅 Festivos y Calendario</h3>
          <div class="mini-cal" id="calConfig"></div>
        </div>

      </div>
    </div>
  </main>
</div>

<script>
// --- FIREBASE Y DATOS ---
const firebaseConfig = {
  apiKey: "AIzaSyC1UlC2AM9gjVOnagrVsIEVzgyRlfHHDoI",
  authDomain: "asistencia-profe-lara.firebaseapp.com",
  projectId: "asistencia-profe-lara",
  storageBucket: "asistencia-profe-lara.firebasestorage.app",
  messagingSenderId: "310256327985",
  appId: "1:310256327985:web:4479876510a865b46ea410"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let DB = {
  config: { theme: 'light' },
  materias: ['Sociales', 'Ciudadanía', 'Matemáticas', 'Español', 'Naturales', 'Inglés'],
  grupos: ['A', 'B', 'C'],
  students: [],
  festivos: [],
  indicadores: {
    P: { label: 'P', emoji: '✅', color: '#A5D8FF' },
    A: { label: 'A', emoji: '❌', color: '#FFC9C9' },
    E: { label: 'E', emoji: '📝', color: '#FFE8CC' }
  },
  asistencia: {}
};

let curMat = 'Sociales';
let curGroup = 'A';
let curMonth = new Date().getMonth();
const MESES = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

// --- LÓGICA DE INICIO ---
async function init() {
  const doc = await db.collection('data').doc('profe_lara').get();
  if (doc.exists) DB = Object.assign(DB, doc.data());
  
  setTheme(DB.config.theme || 'light');
  fillSelects();
  updateSidebar();
  renderConfig();
  renderPlanilla();
}

function setTheme(t) {
  DB.config.theme = t;
  document.documentElement.setAttribute('data-theme', t);
}

function updateMateria() {
  curMat = document.getElementById('mainMat').value;
  const slug = curMat.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  document.documentElement.setAttribute('data-materia', slug);
  renderPlanilla();
}

function fillSelects() {
  document.getElementById('mainMat').innerHTML = DB.materias.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('mainMonth').innerHTML = MESES.map((m, i) => `<option value="${i}" ${i==curMonth?'selected':''}>${m}</option>`).join('');
}

function updateSidebar() {
  document.getElementById('sideGroups').innerHTML = DB.grupos.map(g => `
    <div class="side-item ${g==curGroup?'active':''}" onclick="setGroup('${g}')">
      <div class="dot"></div> Grupo ${g}
    </div>
  `).join('');
}

function setGroup(g) { curGroup = g; updateSidebar(); renderPlanilla(); }

// --- PLANILLA ---
function renderPlanilla() {
  curMonth = parseInt(document.getElementById('mainMonth').value);
  const year = 2026;
  const daysInMonth = new Date(year, curMonth + 1, 0).getDate();
  const students = DB.students.filter(s => s.group === curGroup);

  document.getElementById('currentInfo').textContent = `${curMat} · Grupo ${curGroup}`;

  let html = `<thead><tr><th class="col-name">Estudiante</th>`;
  for(let d=1; d<=daysInMonth; d++) {
    const dateStr = `${year}-${curMonth}-${d}`;
    const dow = new Date(year, curMonth, d).toLocaleDateString('es', {weekday:'short'});
    html += `<th class="th-day ${DB.festivos.includes(dateStr)?'festivo':''}"><span>${dow}</span>${d}</th>`;
  }
  html += `<th>Res</th></tr></thead><tbody>`;

  students.forEach(s => {
    let p=0, a=0;
    let row = `<tr><td class="col-name">
      <div style="font-weight:700">${s.name}</div>
      <div style="font-size:9px; color:var(--mat); cursor:pointer; font-weight:600" onclick="moveStudent('${s.id}')">CAMBIAR GRUPO ⇄</div>
    </td>`;
    for(let d=1; d<=daysInMonth; d++) {
      const dateStr = `${year}-${curMonth}-${d}`;
      const val = DB.asistencia[`${s.id}_${dateStr}`] || '';
      if(val=='P') p++; if(val=='A') a++;
      row += `<td><div class="dot-btn dot-${val||'empty'}" style="background:${DB.indicadores[val]?.color || ''}" onclick="cycle('${s.id}','${dateStr}')">${DB.indicadores[val]?.emoji || ''}</div></td>`;
    }
    row += `<td class="col-name"><div class="res-cell"><span style="color:#2A8A20">${p}P</span><span style="color:#D30000">${a}F</span></div></td></tr>`;
    html += row;
  });
  document.getElementById('tablePlanilla').innerHTML = html + `</tbody>`;
}

function cycle(stuId, date) {
  const key = `${stuId}_${date}`;
  const states = ['', 'P', 'A', 'E'];
  DB.asistencia[key] = states[(states.indexOf(DB.asistencia[key]||'')+1)%4];
  renderPlanilla();
}

// --- CONFIGURACIÓN ---
function renderConfig() {
  document.getElementById('matList').innerHTML = DB.materias.map(m => `<span class="btn btn-ghost" style="margin:2px">${m} <small onclick="removeMat('${m}')">×</small></span>`).join('');
  const letters = ['A','B','C','D','E','F'];
  document.getElementById('groupToggles').innerHTML = letters.map(l => `<button class="btn ${DB.grupos.includes(l)?'btn-primary':'btn-ghost'}" onclick="toggleGrp('${l}')">${l}</button>`).join('');
  document.getElementById('indConfig').innerHTML = Object.keys(DB.indicadores).map(k => `
    <div style="display:flex; gap:8px; margin-bottom:8px">
      <div class="dot-btn" style="background:${DB.indicadores[k].color}">${DB.indicadores[k].emoji}</div>
      <input class="input" style="margin:0" value="${DB.indicadores[k].emoji}" onchange="updateInd('${k}','emoji',this.value)">
      <input type="color" class="input" style="margin:0; width:60px; padding:2px" value="${DB.indicadores[k].color}" onchange="updateInd('${k}','color',this.value)">
    </div>
  `).join('');
  renderMiniCal();
  document.getElementById('stuGroup').innerHTML = DB.grupos.map(g => `<option value="${g}">Grupo ${g}</option>`).join('');
}

function renderMiniCal() {
  const cal = document.getElementById('calConfig');
  cal.innerHTML = Array.from({length:31}, (_,i) => {
    const d = i+1; const ds = `2026-${curMonth}-${d}`;
    return `<div class="cal-d ${DB.festivos.includes(ds)?'festivo':''}" onclick="toggleFestivo('${ds}')">${d}</div>`;
  }).join('');
}

function toggleFestivo(ds) {
  const idx = DB.festivos.indexOf(ds);
  if(idx > -1) DB.festivos.splice(idx, 1); else DB.festivos.push(ds);
  renderPlanilla(); renderMiniCal();
}

function addMateria() {
  const v = document.getElementById('newMat').value;
  if(v) { DB.materias.push(v); document.getElementById('newMat').value=''; renderConfig(); fillSelects(); }
}

function toggleGrp(l) {
  const idx = DB.grupos.indexOf(l);
  if(idx > -1) DB.grupos.splice(idx,1); else DB.grupos.push(l);
  renderConfig(); updateSidebar();
}

function updateInd(k, f, v) { DB.indicadores[k][f] = v; renderPlanilla(); }

function addStudent() {
  const n = document.getElementById('stuName').value;
  const g = document.getElementById('stuGroup').value;
  if(n) { DB.students.push({ id: Date.now().toString(), name: n, group: g }); renderPlanilla(); }
}

function moveStudent(id) {
  const t = prompt("Grupo destino (A, B, C, D, E, F):");
  if(t) { const s = DB.students.find(x => x.id == id); if(s) s.group = t.toUpperCase(); renderPlanilla(); }
}

async function saveToFirebase() {
  await db.collection('data').doc('profe_lara').set(DB);
  alert("✅ Guardado en la nube.");
}

function showTab(t) {
  document.getElementById('tab-planilla').style.display = t=='planilla'?'block':'none';
  document.getElementById('tab-config').style.display = t=='config'?'block':'none';
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab == t));
}

function importExcel(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (evt) => {
    const data = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type:'binary'}).Sheets[XLSX.read(evt.target.result, {type:'binary'}).SheetNames[0]]);
    data.forEach(r => DB.students.push({ id: Math.random().toString(36), name: r.Nombre || r.nombre, group: curGroup }));
    renderPlanilla();
  };
  reader.readAsBinaryString(file);
}

init();
</script>
</body>
</html>
